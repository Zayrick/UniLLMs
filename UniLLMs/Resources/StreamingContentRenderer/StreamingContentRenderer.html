<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
<link rel="stylesheet" href="StreamingContentRenderer.css">
<script>
window.MathJax = {
    loader: { load: ["[tex]/mhchem", "ui/safe"] },
    tex: {
        packages: { "[+]": ["mhchem"] }
    },
    svg: {
        fontCache: "global"
    },
    startup: {
        typeset: false,
        pageReady() {
            return MathJax.startup.defaultPageReady().then(() => {
                window.dispatchEvent(new Event("streamingRendererMathJaxReady"));
            });
        }
    }
};
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@4.1.2/tex-svg.js"></script>
</head>
<body>
<div id="content"></div>
<script type="module">
import { marked } from "https://cdn.jsdelivr.net/npm/marked@18.0.5/+esm";
import DOMPurify from "https://cdn.jsdelivr.net/npm/dompurify@3.3.3/+esm";
import morphdom from "https://cdn.jsdelivr.net/npm/morphdom@2.7.8/+esm";
import hljs from "https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/+esm";

window.streamingRendererMarked = marked;
window.streamingRendererDOMPurify = DOMPurify;
window.streamingRendererMorphdom = morphdom;
window.streamingRendererHLJS = hljs;
window.dispatchEvent(new Event("streamingRendererMarkedReady"));
</script>
<script src="StreamingContentRenderer.js"></script>
</body>
</html>
